<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect all paths to index.html for SPA routing
      var path = window.location.pathname;
      var repo = '/React-LiveChat';
      if (path.startsWith(repo)) {
        path = path.substring(repo.length);
      }
      window.location.replace(
        window.location.origin + repo + '/?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
